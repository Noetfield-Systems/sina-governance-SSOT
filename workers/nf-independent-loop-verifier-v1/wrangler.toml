name = "nf-independent-loop-verifier-v1"
main = "src/index.js"
compatibility_date = "2026-07-18"
account_id = "b7282b4a5c17b84d62e3ef8866b878f8"
workers_dev = true

# KV free-tier cutback on secondary account (b7282b4a): slower cron + fewer writes.
# GHA posture unchanged: Enterprise 50k minutes = ROI classes A–D; this is CF KV
# free tier on the secondary account, NOT "kill GHA".
[triggers]
crons = ["0 */2 * * *"]

[vars]
LOOP_ID = "nf-independent-loop-verifier-v1"
INTERVAL_MINUTES = "120"
CRON = "0 */2 * * *"
VERIFIER_ACCOUNT_ID = "b7282b4a"

# Optional secrets: VERIFIER_TELEGRAM_BOT_TOKEN, VERIFIER_TELEGRAM_CHAT_ID

[[kv_namespaces]]
binding = "VERIFIER_KV"
id = "ecc2e175a8ef49a980c5b1b6e7f8bd81"
