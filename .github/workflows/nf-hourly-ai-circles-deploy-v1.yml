name: nf-hourly-ai-circles-deploy-v1
on:
  workflow_dispatch:
  push:
    paths:
      - "workers/nf-hourly-ai-circles-v1/**"
    branches: [main, feat/hourly-independent-ai-circles]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/nf-hourly-ai-circles-v1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-audit --no-fund
      - name: Deploy builder circle (main account)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_MAIN_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 0d0b967b77e2e5535455d39ff3dae72c
        run: npx wrangler deploy --config builder.wrangler.toml
      - name: Put builder secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_MAIN_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 0d0b967b77e2e5535455d39ff3dae72c
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MOTOR_APP_PRIVATE_KEY: ${{ secrets.MOTOR_APP_PRIVATE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TICK_SECRET: ${{ secrets.HOURLY_AI_CIRCLE_TICK_SECRET }}
          PEER_TICK_SECRET: ${{ secrets.HOURLY_AI_CIRCLE_TICK_SECRET }}
        run: |
          set -euo pipefail
          put() {
            local n="$1"; local v="$2"
            if [ -n "${v:-}" ]; then
              printf '%s' "$v" | npx wrangler secret put "$n" --config builder.wrangler.toml || \
              printf '%s' "$v" | npx wrangler versions secret put "$n" --config builder.wrangler.toml
            else echo "skip $n (empty)"; fi
          }
          # Prefer repo/org secrets when present; empty is non-fatal (local/runway injector may already have set them).
          put DEEPSEEK_API_KEY "${DEEPSEEK_API_KEY:-}"
          put GLM_API_KEY "${GLM_API_KEY:-}"
          put MOONSHOT_API_KEY "${MOONSHOT_API_KEY:-}"
          put HF_TOKEN "${HF_TOKEN:-}"
          put MOTOR_APP_PRIVATE_KEY "${MOTOR_APP_PRIVATE_KEY:-}"
          put OPENAI_API_KEY "${OPENAI_API_KEY:-}"
          put GEMINI_API_KEY "${GEMINI_API_KEY:-}"
          put TICK_SECRET "${TICK_SECRET:-}"
          put PEER_TICK_SECRET "${PEER_TICK_SECRET:-}"
      - name: Deploy independent verifier circle (secondary account)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_VERIFIER_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: b7282b4a5c17b84d62e3ef8866b878f8
        run: npx wrangler deploy --config verifier.wrangler.toml
      - name: Put verifier secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_VERIFIER_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: b7282b4a5c17b84d62e3ef8866b878f8
          VERIFIER_GITHUB_APP_PRIVATE_KEY: ${{ secrets.SG_AUTHORITY_PRIVATE_KEY }}
          VERIFIER_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VERIFIER_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          TICK_SECRET: ${{ secrets.HOURLY_AI_CIRCLE_TICK_SECRET }}
          PEER_TICK_SECRET: ${{ secrets.HOURLY_AI_CIRCLE_TICK_SECRET }}
        run: |
          set -euo pipefail
          put() {
            local n="$1"; local v="$2"
            if [ -n "${v:-}" ]; then printf '%s' "$v" | npx wrangler secret put "$n" --config verifier.wrangler.toml
            else echo "skip $n (empty)"; fi
          }
          put VERIFIER_GITHUB_APP_PRIVATE_KEY "$VERIFIER_GITHUB_APP_PRIVATE_KEY"
          put VERIFIER_OPENAI_API_KEY "$VERIFIER_OPENAI_API_KEY"
          put VERIFIER_GEMINI_API_KEY "$VERIFIER_GEMINI_API_KEY"
          put GLM_API_KEY "$GLM_API_KEY"
          put TICK_SECRET "$TICK_SECRET"
          put PEER_TICK_SECRET "$PEER_TICK_SECRET"
          # Free secondary account uses Worker cron, not Workflow schedules.
      - name: Live health probe
        run: |
          set -euo pipefail
          curl -fsS https://nf-hourly-builder-circle-v1.sina-kazemnezhad-ca.workers.dev/health | tee /tmp/builder-health.json
          curl -fsS https://nf-hourly-independent-verifier-circle-v1.kazemnezhadsina144.workers.dev/health | tee /tmp/verifier-health.json
          python3 - <<'PY'
          import json
          b=json.load(open("/tmp/builder-health.json"))
          v=json.load(open("/tmp/verifier-health.json"))
          assert b.get("ok") is True
          assert v.get("ok") is True
          print("LIVE_HEALTH_PASS")
          PY
