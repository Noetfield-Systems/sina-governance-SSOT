name: nf-commissioning-specialist-deploy-v1
on:
  workflow_dispatch:
  push:
    paths:
      - "workers/nf-commissioning-specialist-tick-v1/**"
      - "data/nf_commissioning_specialist_map_v1.json"
    branches: [main, feature/nf-commissioning-specialist-cron]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/nf-commissioning-specialist-tick-v1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - name: Create KV if needed + deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_MAIN_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 0d0b967b77e2e5535455d39ff3dae72c
        run: |
          set -euo pipefail
          # Ensure KV binding id in wrangler.toml
          if grep -q REPLACE_ON_DEPLOY wrangler.toml; then
            OUT=$(npx wrangler kv namespace create COMMISSIONING_SPECIALIST_RECEIPTS 2>&1 || true)
            echo "$OUT"
            ID=$(echo "$OUT" | sed -n 's/.*id = "\([a-f0-9]*\)".*/\1/p' | tail -1)
            if [ -z "$ID" ]; then
              # list existing
              ID=$(npx wrangler kv namespace list 2>/dev/null | python3 -c 'import sys,json,re; t=sys.stdin.read();
try:
  d=json.loads(t); 
  print(next((x["id"] for x in d if "COMMISSIONING" in x.get("title","")),""))
except Exception:
  m=re.search(r"([a-f0-9]{32})", t); print(m.group(1) if m else "")')
            fi
            test -n "$ID"
            sed -i "s/REPLACE_ON_DEPLOY/$ID/" wrangler.toml
          fi
          npx wrangler deploy
      - name: Put model API secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_MAIN_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 0d0b967b77e2e5535455d39ff3dae72c
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          put() { local n="$1"; local v="$2"; if [ -n "$v" ]; then printf '%s' "$v" | npx wrangler secret put "$n"; else echo "skip $n (empty)"; fi; }
          put DEEPSEEK_API_KEY "$DEEPSEEK_API_KEY"
          put GLM_API_KEY "$GLM_API_KEY"
          put MOONSHOT_API_KEY "$MOONSHOT_API_KEY"
          put HF_TOKEN "$HF_TOKEN"
