name: Agentic CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 * * * *' # hourly for autonomy metrics and revocation checks

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install deps (none)
        run: |
          python -m pip install --upgrade pip
      - name: Byte-compile scripts
        run: |
          python -m py_compile scripts/*.py || true
      - name: Run unit tests
        run: |
          python3 scripts/tests_agentic_v1.py
          python3 scripts/tests_autonomy_grant_policy_v1.py
          python3 scripts/tests_autonomy_revocation_v1.py
      - name: Run autonomy scorer & grant policy
        run: |
          python3 -c "import sys, pathlib; p=pathlib.Path('scripts').resolve().parent; sys.path.insert(0,str(p)); from scripts.autonomy_scorer import main as s; s()" || true
          python3 -c "import sys, pathlib; p=pathlib.Path('scripts').resolve().parent; sys.path.insert(0,str(p)); from scripts.autonomy_grant_policy import main as g; g()" || true
          python3 -c "import sys, pathlib; p=pathlib.Path('scripts').resolve().parent; sys.path.insert(0,str(p)); from scripts.autonomy_revocation_checker import main as r; r()" || true
      - name: Upload receipts (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: agentic-receipts
          path: receipts/agentic/**
