name: brain-loop-autorun-v1

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Containment mode"
        required: true
        type: choice
        default: observe-only
        options:
          - observe-only

permissions:
  contents: read
  actions: read

concurrency:
  group: brain-loop-autorun-v1-containment
  cancel-in-progress: false

jobs:
  observe-only:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout SG
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Record observe-only containment receipt
        env:
          CI: "true"
          SG_OBSERVE_ONLY: "1"
        run: bash scripts/brain_loop_autorun_v1.sh

      - name: Agent read staleness observation
        if: always()
        run: |
          chmod +x scripts/verify_agent_read_staleness_v1.sh
          ./scripts/verify_agent_read_staleness_v1.sh || true

      - name: Upload observe-only receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: brain-loop-observe-only-receipt
          path: receipts/brain-loop-autorun-*.json
          if-no-files-found: error
