name: nf-48h-liveness-closeout-v1

# Closes the Living System 48h test started by receipts/48h-test-run1-START.json.
# Cloud-first: the RECURRING tick lives on Cloudflare (nf-sg-loop-tick-v1). This
# GHA is a ONE-SHOT apply job fired by that CF motor via repository_dispatch
# (liveness_48h_close) — GitHub is never the recurring scheduler here.

on:
  repository_dispatch:
    types: [liveness_48h_close]
  workflow_dispatch:
    inputs:
      force_close:
        description: "Force close evaluation now (ignore 48h window)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  closeout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Evaluate 48h liveness
        env:
          FORCE_CLOSE: ${{ inputs.force_close }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json, os, urllib.request
          from datetime import datetime, timezone, timedelta
          from pathlib import Path

          start_path = Path("receipts/48h-test-run1-START.json")
          if not start_path.is_file():
              print("no start receipt — skip")
              raise SystemExit(0)
          start = json.loads(start_path.read_text())
          started = datetime.fromisoformat(start["captured_at"].replace("Z", "+00:00"))
          now = datetime.now(timezone.utc)
          force = os.environ.get("FORCE_CLOSE", "false").lower() == "true"
          elapsed_h = (now - started).total_seconds() / 3600
          print(f"elapsed_h={elapsed_h:.2f} force={force}")
          if elapsed_h < 48 and not force:
              print("window open — not closing yet")
              raise SystemExit(0)

          results = []
          ok_all = True
          for loop in start.get("loops", []):
              url = loop.get("health")
              row = {"loop_id": loop.get("loop_id"), "health": url, "ok": False}
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "nf-48h-closeout"})
                  with urllib.request.urlopen(req, timeout=20) as resp:
                      body = json.loads(resp.read().decode())
                      row["ok"] = bool(body.get("ok"))
                      row["body"] = {k: body.get(k) for k in ("ok", "hold", "last_fired_at", "service", "foundation_status") if k in body}
              except Exception as e:
                  row["error"] = str(e)
                  ok_all = False
              if not row["ok"]:
                  ok_all = False
              results.append(row)

          verdict = "PASS" if ok_all else "FAIL"
          out = {
              "receipt_type": "living_system_48h_test_end_v1",
              "captured_at": now.strftime("%Y-%m-%dT%H:%M:%SZ"),
              "verdict": verdict,
              "started_at": start["captured_at"],
              "elapsed_hours": round(elapsed_h, 3),
              "force_close": force,
              "loops": results,
              "protocol": start.get("protocol"),
              "hold": "HOLD",
          }
          path = Path(f"receipts/48h-test-run1-{verdict}.json")
          path.write_text(json.dumps(out, indent=2) + "\n")
          print("WROTE", path)
          print(json.dumps(out, indent=2))
          if not ok_all:
              raise SystemExit(1)
          PY
      - name: Commit closeout receipt if present
        run: |
          set -euo pipefail
          if ls receipts/48h-test-run1-PASS.json receipts/48h-test-run1-FAIL.json 2>/dev/null; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add receipts/48h-test-run1-PASS.json receipts/48h-test-run1-FAIL.json || true
            git diff --cached --quiet && echo "nothing to commit" && exit 0
            git commit -m "receipt(48h): close living-system liveness window"
            git push
          else
            echo "no closeout file this run"
          fi
