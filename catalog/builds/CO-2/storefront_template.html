<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pattern Factory Storefront</title>
<style>
  :root {
    --bg:#ffffff; --panel:#f6f7f9; --ink:#1c2126; --muted:#5b646e;
    --line:#e2e6ea; --accent:#3a4a5a; --card:#ffffff;
    --sell-bg:#e5f2ea; --sell-ink:#2f7d54; --sell-line:#bfe0cd;
    --build-bg:#eaf0f6; --build-ink:#3a5a7a; --build-line:#c8d8e8;
    --lock-bg:#efe7d6; --lock-ink:#6b5a2e; --lock-line:#ddcea8;
    --warn-bg:#fbeede; --warn-ink:#9a6a1e; --warn-line:#e8cfa0;
    --banner-bg:#7a1f1f; --banner-ink:#ffffff;
    --synth-bg:#f0ecf6; --synth-ink:#6a4f8a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#12161a; --panel:#1a2027; --ink:#e7ecf1; --muted:#9aa5b0;
      --line:#2a323b; --accent:#9fb4c7; --card:#161b21;
      --sell-bg:#17301f; --sell-ink:#5fc191; --sell-line:#255238;
      --build-bg:#182633; --build-ink:#8fb6dc; --build-line:#274058;
      --lock-bg:#2b2718; --lock-ink:#d8c384; --lock-line:#4a4224;
      --warn-bg:#2e2410; --warn-ink:#e0b45a; --warn-line:#524019;
      --banner-bg:#8f2626; --banner-ink:#ffffff;
      --synth-bg:#221b30; --synth-ink:#b79fda;
    }
  }
  :root[data-theme="dark"] {
    --bg:#12161a; --panel:#1a2027; --ink:#e7ecf1; --muted:#9aa5b0;
    --line:#2a323b; --accent:#9fb4c7; --card:#161b21;
    --sell-bg:#17301f; --sell-ink:#5fc191; --sell-line:#255238;
    --build-bg:#182633; --build-ink:#8fb6dc; --build-line:#274058;
    --lock-bg:#2b2718; --lock-ink:#d8c384; --lock-line:#4a4224;
    --warn-bg:#2e2410; --warn-ink:#e0b45a; --warn-line:#524019;
    --banner-bg:#8f2626; --banner-ink:#ffffff;
    --synth-bg:#221b30; --synth-ink:#b79fda;
  }
  :root[data-theme="light"] {
    --bg:#ffffff; --panel:#f6f7f9; --ink:#1c2126; --muted:#5b646e;
    --line:#e2e6ea; --accent:#3a4a5a; --card:#ffffff;
    --sell-bg:#e5f2ea; --sell-ink:#2f7d54; --sell-line:#bfe0cd;
    --build-bg:#eaf0f6; --build-ink:#3a5a7a; --build-line:#c8d8e8;
    --lock-bg:#efe7d6; --lock-ink:#6b5a2e; --lock-line:#ddcea8;
    --warn-bg:#fbeede; --warn-ink:#9a6a1e; --warn-line:#e8cfa0;
    --banner-bg:#7a1f1f; --banner-ink:#ffffff;
    --synth-bg:#f0ecf6; --synth-ink:#6a4f8a;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
    font:15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  .wrap { max-width:1000px; margin:0 auto; padding:24px 20px 64px; }
  .banner { background:var(--banner-bg); color:var(--banner-ink); font-weight:700;
    text-align:center; padding:10px 14px; border-radius:8px; letter-spacing:.02em;
    font-size:13px; margin-bottom:24px; }
  .theme-toggle { float:right; font-size:12px; color:var(--muted); cursor:pointer; user-select:none;
    border:1px solid var(--line); border-radius:6px; padding:3px 9px; background:var(--panel); }
  h1 { font-size:26px; margin:8px 0 4px; }
  .sub { color:var(--muted); font-size:14px; margin:0 0 18px; max-width:70ch; }
  .ladder { display:flex; flex-wrap:wrap; gap:10px; margin:0 0 24px; padding:14px;
    background:var(--panel); border:1px solid var(--line); border-radius:10px; }
  .ladder .rung { flex:1 1 200px; border:1px solid var(--line); border-radius:8px; padding:10px 12px; background:var(--card); }
  .ladder .rung .tl { font-weight:600; font-size:13.5px; }
  .ladder .rung .tn { font-size:12px; color:var(--muted); margin-top:4px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:16px; }
  .card { border:1px solid var(--line); border-radius:12px; padding:16px 18px; background:var(--card);
    display:flex; flex-direction:column; gap:10px; }
  .card-head { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
  .card-head h2 { font-size:17px; margin:0; }
  .badge { font-size:11.5px; font-weight:700; padding:2px 9px; border-radius:999px; white-space:nowrap; border:1px solid; }
  .b-sell { background:var(--sell-bg); color:var(--sell-ink); border-color:var(--sell-line); }
  .b-build { background:var(--build-bg); color:var(--build-ink); border-color:var(--build-line); }
  .b-lock { background:var(--lock-bg); color:var(--lock-ink); border-color:var(--lock-line); }
  .tier-label { font-size:12px; color:var(--muted); font-weight:600; }
  .what { font-size:13.5px; margin:0; }
  .pain { font-size:12.5px; color:var(--muted); margin:0; }
  .pain b, .proof b, .commercial b { color:var(--ink); font-weight:600; }
  .commercial { font-size:12.5px; margin:0; }
  .proof { font-size:12px; color:var(--muted); margin:0; border-top:1px solid var(--line); padding-top:8px; }
  .price-row { display:flex; align-items:center; flex-wrap:wrap; gap:8px; margin-top:2px; }
  .price { font-size:15px; font-weight:700; }
  .price.locked { color:var(--lock-ink); }
  .price.unpop { color:var(--warn-ink); font-weight:700; }
  .synth-tag { font-size:10.5px; font-weight:700; letter-spacing:.02em; padding:1px 7px; border-radius:999px;
    background:var(--synth-bg); color:var(--synth-ink); }
  .unpop-tag { font-size:10.5px; font-weight:700; padding:1px 7px; border-radius:999px;
    background:var(--warn-bg); color:var(--warn-ink); border:1px solid var(--warn-line); }
  .price-note { font-size:11.5px; color:var(--muted); margin:0; }
  .src { font-size:11px; color:var(--muted); font-family:ui-monospace, SFMono-Regular, Menlo, monospace; }
  h3.section-title { font-size:16px; margin:34px 0 6px; border-top:1px solid var(--line); padding-top:22px; }
  .disclaimer { background:var(--panel); border:1px solid var(--line); border-left:4px solid var(--synth-ink);
    border-radius:8px; padding:12px 14px; font-size:12.5px; color:var(--muted); margin:20px 0 0; }
  footer { margin-top:26px; padding-top:14px; border-top:1px solid var(--line); color:var(--muted); font-size:12px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="banner">__BANNER_TEXT__</div>
  <span class="theme-toggle" onclick="(function(r){var t=r.getAttribute('data-theme')==='dark'?'light':'dark';r.setAttribute('data-theme',t);})(document.documentElement)">toggle theme</span>
  <h1>__STOREFRONT__</h1>
  <p class="sub">__SUBTITLE__</p>

  <h3 class="section-title">Engagement ladder</h3>
  <div class="ladder">
    __LADDER_RUNGS__
  </div>

  <h3 class="section-title">Patterns</h3>
  <div class="grid">
    __PATTERN_CARDS__
  </div>

  <div class="disclaimer">__PRICE_DISCLAIMER__</div>

  <footer>__FOOTER_NOTE__</footer>
</div>
</body>
</html>
